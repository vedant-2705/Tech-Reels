version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: techreel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tech_reel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tech_reel']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: techreel_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    # Uncomment to add a password (also set REDIS_PASSWORD in .env):
    # command: redis-server --requirepass yourpassword
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: